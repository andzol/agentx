steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/amazon-tracker:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/amazon-tracker:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/amazon-tracker"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "${_JOB_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/amazon-tracker:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--set-env-vars=GITHUB_TASKS_REPO=${_GITHUB_TASKS_REPO},SHEETS_SA_KEY_PATH=/secrets/sheets-sa-key.json,AGENTX_SSH_KEY_PATH=/secrets/agentx_ssh_key"
      - "--set-secrets=/secrets/sheets-sa-key.json=sheets-sa-key:latest,AGENTX_PHP_TOKEN=agentx-php-token:latest,/secrets/agentx_ssh_key=agentx-ssh-joelbooks-key:latest"
      - "--max-retries=1"
      - "--task-timeout=15m"
      - "--memory=1Gi"
      - "--cpu=1"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/amazon-tracker:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/amazon-tracker:latest"

substitutions:
  _REGION: us-central1
  _REPO: amazon-tracker
  _JOB_NAME: amazon-tracker-job
  _GITHUB_TASKS_REPO: andzol/agentx

options:
  logging: CLOUD_LOGGING_ONLY
